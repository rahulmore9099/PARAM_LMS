{% extends 'dashboard/base_dashboard.html' %}

{% block title %}Edit Batch - Smart LMS{% endblock %}
{% block page_title %}Edit Batch{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'admin_batches' %}" class="text-primary hover:underline flex items-center space-x-2">
        <i class="fas fa-arrow-left"></i>
        <span>Back to Batches</span>
    </a>
</div>

<div class="bg-white rounded-xl shadow-sm p-8">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-gray-800 flex items-center space-x-3">
            <i class="fas fa-edit text-primary"></i>
            <span>Edit Batch</span>
        </h2>
        <p class="text-gray-600 mt-2">Update batch details</p>
    </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        
        <div class="border-l-4 border-blue-500 pl-4">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">
                <i class="fas fa-info-circle mr-2"></i>Batch Information
            </h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-tag mr-2"></i>Batch Name <span class="text-red-500">*</span>
                    </label>
                    <input type="text" name="name" value="{{ batch.name }}" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-book mr-2"></i>Course <span class="text-red-500">*</span>
                    </label>
                    <select name="course" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        <option value="">Select Course</option>
                        {% for course in courses %}
                        <option value="{{ course.id }}" {% if batch.course.id == course.id %}selected{% endif %}>{{ course.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-chalkboard-teacher mr-2"></i>Mentor
                    </label>
                    <select name="mentor" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        <option value="">Select Mentor</option>
                        {% for mentor in mentors %}
                        <option value="{{ mentor.id }}" {% if batch.mentor and batch.mentor.id == mentor.id %}selected{% endif %}>{{ mentor.get_full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-calendar-alt mr-2"></i>Start Date <span class="text-red-500">*</span>
                    </label>
                    <input type="date" name="start_date" value="{{ batch.start_date|date:'Y-m-d' }}" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-calendar-check mr-2"></i>End Date <span class="text-red-500">*</span>
                    </label>
                    <input type="date" name="end_date" value="{{ batch.end_date|date:'Y-m-d' }}" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                
                <div class="md:col-span-2">
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" name="is_active" {% if batch.is_active %}checked{% endif %} class="w-5 h-5 text-primary border-gray-300 rounded focus:ring-primary">
                        <span class="text-sm font-semibold text-gray-700">
                            <i class="fas fa-check-circle mr-2"></i>Active Batch
                        </span>
                    </label>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-end space-x-4 pt-6 border-t">
            <a href="{% url 'admin_batches' %}" class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                <i class="fas fa-times mr-2"></i>Cancel
            </a>
            <button type="submit" class="px-6 py-3 bg-primary text-white rounded-lg hover:bg-blue-700 transition">
                <i class="fas fa-save mr-2"></i>Update Batch
            </button>
        </div>
    </form>
</div>
{% endblock %}
