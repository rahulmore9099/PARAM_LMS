{% extends 'dashboard/base_dashboard.html' %}

{% block title %}Add Exam - Smart LMS{% endblock %}
{% block page_title %}Add New Exam{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'admin_exams' %}" class="text-primary hover:underline flex items-center space-x-2">
        <i class="fas fa-arrow-left"></i>
        <span>Back to Exams</span>
    </a>
</div>

<div class="bg-white rounded-xl shadow-sm p-8">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-gray-800 flex items-center space-x-3">
            <i class="fas fa-plus-circle text-primary"></i>
            <span>Add New Exam</span>
        </h2>
        <p class="text-gray-600 mt-2">Fill in the details to create a new exam</p>
    </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        
        <div class="border-l-4 border-blue-500 pl-4">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">
                <i class="fas fa-info-circle mr-2"></i>Exam Information
            </h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-heading mr-2"></i>Exam Title <span class="text-red-500">*</span>
                    </label>
                    <input type="text" name="title" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="e.g., Python Basics Quiz">
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-align-left mr-2"></i>Description
                    </label>
                    <textarea name="description" rows="3" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="Enter exam description..."></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-list mr-2"></i>Exam Type <span class="text-red-500">*</span>
                    </label>
                    <select name="exam_type" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        <option value="">Select Type</option>
                        <option value="quiz">Quiz</option>
                        <option value="practical">Practical</option>
                        <option value="mock">Mock Test</option>
                        <option value="final">Final Assessment</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-layer-group mr-2"></i>Phase <span class="text-red-500">*</span>
                    </label>
                    <select name="phase" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        <option value="">Select Phase</option>
                        {% for phase in phases %}
                        <option value="{{ phase.id }}">{{ phase.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-clock mr-2"></i>Duration (Minutes) <span class="text-red-500">*</span>
                    </label>
                    <input type="number" name="duration_minutes" required min="1" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="e.g., 60">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-star mr-2"></i>Total Marks <span class="text-red-500">*</span>
                    </label>
                    <input type="number" name="total_marks" required min="1" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="e.g., 100">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-check mr-2"></i>Pass Marks <span class="text-red-500">*</span>
                    </label>
                    <input type="number" name="pass_marks" required min="1" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="e.g., 40">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-calendar-alt mr-2"></i>Start Time <span class="text-red-500">*</span>
                    </label>
                    <input type="datetime-local" name="start_time" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-calendar-check mr-2"></i>End Time <span class="text-red-500">*</span>
                    </label>
                    <input type="datetime-local" name="end_time" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
                
                <div class="md:col-span-2">
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" name="is_active" checked class="w-5 h-5 text-primary border-gray-300 rounded focus:ring-primary">
                        <span class="text-sm font-semibold text-gray-700">
                            <i class="fas fa-check-circle mr-2"></i>Active Exam
                        </span>
                    </label>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-end space-x-4 pt-6 border-t">
            <a href="{% url 'admin_exams' %}" class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                <i class="fas fa-times mr-2"></i>Cancel
            </a>
            <button type="submit" class="px-6 py-3 bg-primary text-white rounded-lg hover:bg-blue-700 transition">
                <i class="fas fa-save mr-2"></i>Save Exam
            </button>
        </div>
    </form>
</div>
{% endblock %}
